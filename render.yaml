services:
  - type: web
    name: makeway-ates
    env: node
    plan: free
    # Build: install root deps + build the React client into client/dist
    buildCommand: npm run install:all && npm run build
    # Start: serve both API and React static files from one Express process
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Set this in Render Dashboard → Environment → GIVEWAY_NODE_KEY
      # Must match the secret flashed to your ESP32-CAM firmware
      - key: GIVEWAY_NODE_KEY
        sync: false
