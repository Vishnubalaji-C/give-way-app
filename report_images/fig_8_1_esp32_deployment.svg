<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ground -->
  <rect x="0" y="400" width="600" height="100" fill="#f8fafc" />
  <line x1="0" y1="400" x2="600" y2="400" stroke="#e2e8f0" stroke-width="2" />

  <!-- Road / Lane -->
  <path d="M100 400 L500 400 L550 500 L50 500 Z" fill="#f1f5f9" stroke="#cbd5e1" />
  <line x1="300" y1="400" x2="300" y2="500" stroke="#ffffff" stroke-dasharray="10,10" stroke-width="2" />

  <!-- Pole -->
  <rect x="420" y="100" width="10" height="300" fill="url(#metalGrad)" rx="2" />
  
  <!-- Camera Mount -->
  <rect x="380" y="120" width="40" height="8" fill="#334155" rx="2" />

  <!-- ESP32-CAM Unit -->
  <rect x="350" y="110" width="40" height="25" fill="#1e293b" rx="4" />
  <circle cx="360" cy="122.5" r="6" fill="#06b6d4" />
  <circle cx="360" cy="122.5" r="2" fill="#ffffff" />
  <rect x="380" y="115" width="5" height="15" fill="#ef4444" rx="1" /> <!-- Power LED -->

  <!-- FOV Lines -->
  <path d="M350 122.5 L150 400 M350 122.5 L450 400" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,2" opacity="0.3" fill="none" />
  <path d="M150 400 Q300 450 450 400" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,2" opacity="0.3" fill="none" />

  <!-- Labels -->
  <text x="350" y="90" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">ESP32-CAM EDGE NODE</text>
  <text x="350" y="105" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Lane 3: Optical Density Sensor</text>

  <text x="250" y="440" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" transform="rotate(-10, 250, 440)">VEHICLE DETECTION ZONE</text>

  <!-- Data Flow Icon -->
  <path d="M340 122.5 L280 122.5" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)" />
  <text x="240" y="120" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#4f46e5">WIFI / PULSE DATA</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5" />
    </marker>
  </defs>

  <!-- Technical Spec Box -->
  <rect x="20" y="20" width="180" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="30" y="40" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">TECH SPEC: FIG 8.1</text>
  <text x="30" y="60" font-family="Inter, sans-serif" font-size="9" fill="#64748b">• Resolution: 800x600 px</text>
  <text x="30" y="75" font-family="Inter, sans-serif" font-size="9" fill="#64748b">• Interface: OV2640 Lens</text>
  <text x="30" y="90" font-family="Inter, sans-serif" font-size="9" fill="#64748b">• Protocol: Pulsed Density</text>
  <text x="30" y="105" font-family="Inter, sans-serif" font-size="9" fill="#64748b">• Accuracy: 96% (ATES v4)</text>
</svg>
