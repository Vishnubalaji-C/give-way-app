<!DOCTYPE html>
<html>
<body style="background:#f0f2f5; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:40px;">

<div id="render-target" style="background:#ffffff; padding:50px; display:inline-block; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 10px 25px rgba(0,0,0,0.05); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="text-align:center; margin-bottom: 40px;">
    <h2 style="color:#0f172a; margin:0; font-size:26px;">PCE Decision Engine Logic</h2>
    <p style="color:#4f46e5; margin:10px 0 0 0; font-weight:bold; font-size:18px; font-family:monospace;">Priority = Σ(V_i * W_i) + WTP</p>
  </div>
  
  <div style="display:flex; justify-content:space-between; gap:60px;">
    
    <!-- Left Box -->
    <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:25px; width:300px; box-sizing:border-box;">
      <h3 style="margin-top:0; color:#334155; font-size:14px; text-transform:uppercase; text-align:center; letter-spacing:1px;">Vehicle Weighting (W)</h3>
      
      <div style="background:#fee2e2; color:#991b1b; padding:12px 18px; border-radius:6px; margin-bottom:10px; display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
        <span>Ambulance (SOS)</span><span>50.0</span>
      </div>
      <div style="background:#fef3c7; color:#b45309; padding:12px 18px; border-radius:6px; margin-bottom:10px; display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
        <span>Public Bus</span><span>15.0</span>
      </div>
      <div style="background:#dbeafe; color:#1e40af; padding:12px 18px; border-radius:6px; margin-bottom:10px; display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
        <span>Heavy Lorry</span><span>8.0</span>
      </div>
      <div style="background:#d1fae5; color:#065f46; padding:12px 18px; border-radius:6px; display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
        <span>Passenger Car</span><span>1.0</span>
      </div>
    </div>

    <!-- Right Box -->
    <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:25px; width:300px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <h3 style="margin-top:0; color:#334155; font-size:14px; text-transform:uppercase; text-align:center; letter-spacing:1px;">Wait Penalty (WTP)</h3>
      <div style="color:#4f46e5; font-size:32px; font-weight:900; font-family:monospace; margin:30px 0;">t^1.5 / 10</div>
      <p style="color:#64748b; font-size:12px; margin:0; text-align:center;">Where t = Seconds since last Green</p>
    </div>

  </div>

  <!-- Arrows -->
  <div style="position:relative; height:100px; margin-top:20px;">
    <svg style="position:absolute; left:150px; top:0; width:180px; height:100px;">
      <path d="M 0 0 L 0 50 L 160 100" stroke="#cbd5e1" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg style="position:absolute; right:150px; top:0; width:180px; height:100px;">
      <path d="M 180 0 L 180 50 L 20 100" stroke="#cbd5e1" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Center Hub -->
  <div style="text-align:center; margin-top:-30px;">
    <div style="background:#1e293b; color:white; width:110px; height:110px; border-radius:50%; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; position:relative; z-index:10; box-shadow:0 10px 15px rgba(0,0,0,0.15);">
      <span style="font-size:36px; font-weight:bold; line-height:1;">∑</span>
      <span style="font-size:11px; font-weight:bold; letter-spacing:1px; margin-top:6px;">ENGINE</span>
    </div>
  </div>

  <!-- Bottom Arrow -->
  <div style="text-align:center; margin-top:15px;">
    <svg width="4" height="40">
      <path d="M 2 0 L 2 40" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
    </svg>
  </div>

  <!-- Output -->
  <div style="text-align:center; margin-top:15px;">
    <div style="background:linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); color:white; display:inline-block; padding:18px 45px; border-radius:40px; font-weight:900; font-size:18px; letter-spacing:1.5px; box-shadow:0 15px 25px rgba(79,70,229,0.25);">
      FINAL PRIORITY SCORE
    </div>
  </div>

</div>

</body>
</html>
