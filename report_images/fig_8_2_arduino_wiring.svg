<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Arduino Mega Body -->
  <rect x="250" y="150" width="300" height="250" rx="10" fill="#00979d" stroke="#008184" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="275" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#ffffff">ARDUINO MEGA 2560</text>
  
  <!-- Pin Headers Top -->
  <rect x="270" y="140" width="260" height="20" fill="#334155" rx="2" />
  <text x="400" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">DIGITAL / PWM PINS</text>

  <!-- Pin Headers Bottom -->
  <rect x="270" y="390" width="260" height="20" fill="#334155" rx="2" />
  <text x="400" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">POWER / ANALOG IN</text>

  <!-- PERIPHERALS -->

  <!-- Traffic Lights Lane 1 -->
  <rect x="50" y="50" width="100" height="150" rx="8" fill="#1e293b" />
  <circle cx="100" cy="80" r="15" fill="#ef4444" />
  <circle cx="100" cy="125" r="15" fill="#facc15" />
  <circle cx="100" cy="170" r="15" fill="#22c55e" />
  <text x="100" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">LANE 1 SIGNALS</text>
  <path d="M150 125 L250 200" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6" />

  <!-- Traffic Lights Lane 2 -->
  <rect x="650" y="50" width="100" height="150" rx="8" fill="#1e293b" />
  <circle cx="700" cy="80" r="15" fill="#ef4444" />
  <circle cx="700" cy="125" r="15" fill="#facc15" />
  <circle cx="700" cy="170" r="15" fill="#22c55e" />
  <text x="700" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">LANE 2 SIGNALS</text>
  <path d="M650 125 L550 200" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.6" />

  <!-- RFID Reader -->
  <rect x="50" y="400" width="120" height="80" rx="4" fill="#334155" />
  <rect x="60" y="410" width="100" height="60" fill="#475569" stroke="#94a3b8" />
  <text x="110" y="445" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff">EM-18</text>
  <text x="110" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">RFID SENSOR</text>
  <path d="M170 440 L250 350" stroke="#0ea5e9" stroke-width="2" fill="none" opacity="0.6" />

  <!-- ESP32 Hub -->
  <rect x="650" y="400" width="100" height="100" rx="4" fill="#1e293b" />
  <rect x="670" y="420" width="60" height="60" fill="#334155" stroke="#06b6d4" />
  <circle cx="700" cy="450" r="8" fill="#000000" />
  <text x="700" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">ESP32-CAM LINK</text>
  <path d="M650 450 L550 350" stroke="#4f46e5" stroke-width="2" fill="none" opacity="0.6" />

  <!-- Labels -->
  <text x="400" y="550" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#64748b">WIRING SCHEMATIC: FIG 8.2</text>
  <text x="400" y="570" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Voltage: 12V DC Input | Logic: 5V TTL</text>
</svg>
