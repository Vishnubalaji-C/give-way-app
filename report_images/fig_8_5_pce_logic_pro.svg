<svg viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <style>
    .text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; fill: #1e293b; }
    .title { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; fill: #ffffff; text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { font-size: 10px; font-weight: 400; fill: #64748b; }
    .box { stroke: #e2e8f0; stroke-width: 1; }
    .highlight { fill: #4f46e5; }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Weighting Matrix -->
  <rect x="50" y="50" width="250" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" class="box" />
  <text x="175" y="80" text-anchor="middle" class="text">VEHICLE WEIGHTING (W)</text>
  
  <rect x="70" y="100" width="210" height="30" rx="4" fill="#ef4444" fill-opacity="0.1" />
  <text x="80" y="120" class="text" font-size="11">Ambulance (SOS)</text>
  <text x="260" y="120" text-anchor="end" class="text" font-size="11">50.0</text>

  <rect x="70" y="135" width="210" height="30" rx="4" fill="#f59e0b" fill-opacity="0.1" />
  <text x="80" y="155" class="text" font-size="11">Public Bus</text>
  <text x="260" y="155" text-anchor="end" class="text" font-size="11">15.0</text>

  <rect x="70" y="170" width="210" height="30" rx="4" fill="#3b82f6" fill-opacity="0.1" />
  <text x="80" y="190" class="text" font-size="11">Heavy Lorry</text>
  <text x="260" y="190" text-anchor="end" class="text" font-size="11">8.0</text>

  <rect x="70" y="205" width="210" height="30" rx="4" fill="#10b981" fill-opacity="0.1" />
  <text x="80" y="225" class="text" font-size="11">Passenger Car</text>
  <text x="260" y="225" text-anchor="end" class="text" font-size="11">1.0</text>

  <!-- Penalty Logic -->
  <rect x="400" y="50" width="250" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" class="box" />
  <text x="525" y="80" text-anchor="middle" class="text">WAIT PENALTY (WTP)</text>
  <text x="525" y="110" text-anchor="middle" class="text" font-size="18" fill="#4f46e5">t^1.5 / 10</text>
  <text x="525" y="130" text-anchor="middle" class="subtitle">Where t = Seconds since last Green</text>

  <!-- Summation Engine -->
  <path d="M175 250 L175 350 L300 400" class="arrow" />
  <path d="M525 150 L525 350 L400 400" class="arrow" />

  <circle cx="350" cy="400" r="60" fill="#1e293b" class="box" />
  <text x="350" y="395" text-anchor="middle" class="title" font-size="24">∑</text>
  <text x="350" y="415" text-anchor="middle" class="title" font-size="10">DECISION ENGINE</text>

  <path d="M350 460 L350 520" class="arrow" />

  <!-- Final Result -->
  <rect x="225" y="520" width="250" height="50" rx="25" fill="#4f46e5" class="box" />
  <text x="337" y="550" text-anchor="middle" class="title" font-size="14">FINAL PRIORITY SCORE</text>

  <!-- Formula Callout -->
  <text x="350" y="30" text-anchor="middle" class="text" font-size="16" fill="#1e293b">Priority = Σ(V_i * W_i) + WTP</text>
</svg>
