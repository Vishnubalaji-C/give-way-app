<svg viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fcfcfc" />
  <style>
    .text { font-family: 'Segoe UI', sans-serif; font-weight: bold; font-size: 14px; fill: #333; }
    .title { font-family: 'Segoe UI', sans-serif; font-weight: 900; font-size: 18px; fill: #000; text-transform: uppercase; }
    .shape { stroke: #2c3e50; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: url(#rough); }
    .highlight { fill: #e0f7fa; stroke: #00acc1; }
    .emergency { fill: #ffebee; stroke: #e53935; }
  </style>
  <defs>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <!-- START -->
  <ellipse cx="300" cy="50" rx="70" ry="30" class="shape highlight" />
  <text x="300" y="55" text-anchor="middle" class="text">START: SYSTEM BOOT</text>

  <!-- SENSORS -->
  <path d="M300 80 L300 120" stroke="#2c3e50" stroke-width="2" />
  <rect x="150" y="120" width="300" height="70" class="shape" fill="#f5f5f5" />
  <text x="300" y="145" text-anchor="middle" class="text">DATA ACQUISITION</text>
  <text x="300" y="165" text-anchor="middle" class="text" font-size="11" fill="#555">RFID (L1/L2) | AI OPTICAL (L3)</text>

  <!-- PCE CALC -->
  <path d="M300 190 L300 230" stroke="#2c3e50" stroke-width="2" />
  <rect x="175" y="230" width="250" height="60" class="shape highlight" />
  <text x="300" y="255" text-anchor="middle" class="text">COMPUTE PCE DENSITY</text>
  <text x="300" y="275" text-anchor="middle" class="text" font-size="10" fill="#006064">Weighting: AMB > BUS > CAR</text>

  <!-- EMERGENCY CHECK -->
  <path d="M300 290 L300 330" stroke="#2c3e50" stroke-width="2" />
  <path d="M300 330 L400 380 L300 430 L200 380 Z" class="shape emergency" />
  <text x="300" y="375" text-anchor="middle" class="text" font-size="11">EMERGENCY</text>
  <text x="300" y="390" text-anchor="middle" class="text" font-size="11">DETECTED?</text>

  <!-- EMERGENCY YES -->
  <path d="M400 380 L500 380 L500 450" stroke="#2c3e50" stroke-width="2" fill="none" />
  <text x="430" y="375" class="text" font-size="12">YES</text>
  <rect x="400" y="450" width="180" height="60" class="shape emergency" />
  <text x="490" y="475" text-anchor="middle" class="text">FORCE GREEN</text>
  <text x="490" y="495" text-anchor="middle" class="text" font-size="10">Priority Lane Override</text>

  <!-- EMERGENCY NO -->
  <path d="M300 430 L300 470" stroke="#2c3e50" stroke-width="2" />
  <text x="310" y="450" class="text" font-size="12">NO</text>
  <rect x="175" y="470" width="250" height="60" class="shape highlight" />
  <text x="300" y="495" text-anchor="middle" class="text">ADAPTIVE PHASE LOGIC</text>
  <text x="300" y="515" text-anchor="middle" class="text" font-size="10">PCE Score + Wait Time Penalty</text>

  <!-- DECISION ENGINE -->
  <path d="M300 530 L300 570" stroke="#2c3e50" stroke-width="2" />
  <rect x="150" y="570" width="300" height="60" class="shape" fill="#fff9c4" />
  <text x="300" y="595" text-anchor="middle" class="text">SELECT NEXT PRIORITY LANE</text>
  <text x="300" y="615" text-anchor="middle" class="text" font-size="10" fill="#f57f17">Max(PCE + WTP)</text>

  <!-- OUTPUT ARDUINO -->
  <path d="M300 630 L300 670" stroke="#2c3e50" stroke-width="2" />
  <rect x="175" y="670" width="250" height="60" class="shape" fill="#e0e0e0" />
  <text x="300" y="695" text-anchor="middle" class="text">SERIAL SIGNAL OUTPUT</text>
  <text x="300" y="715" text-anchor="middle" class="text" font-size="11">Arduino Mega Controller</text>

  <!-- FEEDBACK LOOP -->
  <path d="M175 700 L100 700 L100 155 L150 155" stroke="#2c3e50" stroke-width="2" fill="none" />
  <text x="110" y="690" class="text" font-size="10">RE-EVALUATE</text>

  <!-- Dashboard Update -->
  <path d="M300 730 L300 770" stroke="#2c3e50" stroke-width="2" />
  <rect x="200" y="770" width="200" height="50" class="shape highlight" />
  <text x="300" y="800" text-anchor="middle" class="text">SYNC DASHBOARD</text>
</svg>
