<!DOCTYPE html>
<html>
<body style="background:#f0f2f5; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:40px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

<div style="background:#ffffff; padding:50px; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 10px 25px rgba(0,0,0,0.05); width: 650px;">
  <div style="text-align:center; margin-bottom: 40px;">
    <h2 style="color:#0f172a; margin:0; font-size:26px;">Lane Throughput Analysis</h2>
    <p style="color:#64748b; margin:8px 0 0 0; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Vehicles Processed per Hour (Peak Traffic)</p>
  </div>
  
  <div style="display:flex; align-items:flex-end; justify-content:space-around; height:300px; padding-bottom:10px; border-bottom:2px solid #cbd5e1; position:relative;">
    
    <!-- Y-Axis Labels -->
    <div style="position:absolute; left:-40px; bottom:10px; top:0; display:flex; flex-direction:column; justify-content:space-between; color:#94a3b8; font-size:12px; font-weight:bold;">
      <span>1200</span>
      <span>900</span>
      <span>600</span>
      <span>300</span>
      <span>0</span>
    </div>

    <!-- Grid Lines -->
    <div style="position:absolute; left:0; right:0; bottom:85px; height:1px; background:#f1f5f9; z-index:0;"></div>
    <div style="position:absolute; left:0; right:0; bottom:160px; height:1px; background:#f1f5f9; z-index:0;"></div>
    <div style="position:absolute; left:0; right:0; bottom:235px; height:1px; background:#f1f5f9; z-index:0;"></div>

    <!-- Lane 1 -->
    <div style="display:flex; gap:12px; z-index:1;">
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#64748b; margin-bottom:8px;">650</span>
        <div style="width:45px; height:162px; background:#cbd5e1; border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#4f46e5; margin-bottom:8px;">1050</span>
        <div style="width:45px; height:262px; background:linear-gradient(to top, #4f46e5, #06b6d4); border-radius:6px 6px 0 0; box-shadow:0 10px 15px rgba(79,70,229,0.3);"></div>
      </div>
    </div>

    <!-- Lane 2 -->
    <div style="display:flex; gap:12px; z-index:1;">
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#64748b; margin-bottom:8px;">580</span>
        <div style="width:45px; height:145px; background:#cbd5e1; border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#4f46e5; margin-bottom:8px;">890</span>
        <div style="width:45px; height:222px; background:linear-gradient(to top, #4f46e5, #06b6d4); border-radius:6px 6px 0 0; box-shadow:0 10px 15px rgba(79,70,229,0.3);"></div>
      </div>
    </div>

    <!-- Lane 3 -->
    <div style="display:flex; gap:12px; z-index:1;">
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#64748b; margin-bottom:8px;">610</span>
        <div style="width:45px; height:152px; background:#cbd5e1; border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
        <span style="font-size:13px; font-weight:bold; color:#4f46e5; margin-bottom:8px;">950</span>
        <div style="width:45px; height:237px; background:linear-gradient(to top, #4f46e5, #06b6d4); border-radius:6px 6px 0 0; box-shadow:0 10px 15px rgba(79,70,229,0.3);"></div>
      </div>
    </div>
  </div>

  <div style="display:flex; justify-content:space-around; margin-top:20px; font-weight:bold; color:#334155; font-size:14px;">
    <div>Lane 1 (Primary)</div>
    <div>Lane 2 (Secondary)</div>
    <div>Lane 3 (Transverse)</div>
  </div>

  <!-- Legend -->
  <div style="display:flex; justify-content:center; gap:40px; margin-top:50px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:20px; height:20px; background:#cbd5e1; border-radius:4px;"></div>
      <span style="color:#64748b; font-size:15px; font-weight:500;">Traditional Fixed-Timer</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:20px; height:20px; background:linear-gradient(to top, #4f46e5, #06b6d4); border-radius:4px; box-shadow:0 4px 6px rgba(79,70,229,0.2);"></div>
      <span style="color:#0f172a; font-weight:bold; font-size:15px;">GiveWay ATES</span>
    </div>
  </div>

</div>
</body>
</html>
