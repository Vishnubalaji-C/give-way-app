<svg viewBox="0 0 600 950" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff" />
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <style>
    .text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #1e293b; }
    .title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; fill: #ffffff; text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { font-size: 10px; font-weight: 400; fill: #64748b; }
    .box { stroke: #e2e8f0; stroke-width: 1; filter: url(#shadow); }
    .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>

  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
  </marker>

  <!-- START -->
  <rect x="225" y="30" width="150" height="45" rx="22.5" fill="url(#grad1)" class="box" />
  <text x="300" y="58" text-anchor="middle" class="title">SYSTEM BOOT</text>

  <path d="M300 75 L300 120" class="arrow" />

  <!-- DATA ACQUISITION -->
  <rect x="150" y="120" width="300" height="70" rx="8" fill="#f8fafc" class="box" />
  <text x="300" y="150" text-anchor="middle" class="text">SENSOR DATA ACQUISITION</text>
  <text x="300" y="168" text-anchor="middle" class="subtitle">UPLINK: RFID (L1/L2) | AI OPTICAL (L3)</text>

  <path d="M300 190 L300 240" class="arrow" />

  <!-- PCE CALC -->
  <rect x="175" y="240" width="250" height="65" rx="8" fill="#f1f5f9" class="box" />
  <text x="300" y="270" text-anchor="middle" class="text">PCE DENSITY CALCULATION</text>
  <text x="300" y="288" text-anchor="middle" class="subtitle">ALGORITHM: WEIGHTED PRIORITY SUMMATION</text>

  <path d="M300 305 L300 350" class="arrow" />

  <!-- EMERGENCY DECISION -->
  <path d="M300 350 L420 400 L300 450 L180 400 Z" fill="#fff1f2" stroke="#fecaca" stroke-width="2" class="box" />
  <text x="300" y="398" text-anchor="middle" class="text" fill="#991b1b">EMERGENCY?</text>
  <text x="300" y="414" text-anchor="middle" class="subtitle">PRIORITY TAG SCAN</text>

  <!-- EMERGENCY YES -->
  <path d="M420 400 L500 400 L500 480" class="arrow" />
  <text x="440" y="390" class="text" fill="#991b1b">YES</text>
  <rect x="420" y="480" width="160" height="60" rx="8" fill="url(#grad2)" class="box" />
  <text x="500" y="515" text-anchor="middle" class="title" font-size="12">FORCE GREEN</text>

  <!-- EMERGENCY NO -->
  <path d="M300 450 L300 500" class="arrow" />
  <text x="315" y="475" class="text" fill="#64748b">NO</text>
  <rect x="175" y="500" width="250" height="65" rx="8" fill="#f1f5f9" class="box" />
  <text x="300" y="530" text-anchor="middle" class="text">ADAPTIVE PHASE SELECTION</text>
  <text x="300" y="548" text-anchor="middle" class="subtitle">INPUT: PCE SCORE + WAIT TIME PENALTY</text>

  <path d="M300 565 L300 610" class="arrow" />

  <!-- DECISION ENGINE -->
  <rect x="150" y="610" width="300" height="70" rx="8" fill="#fefce8" stroke="#fef08a" class="box" />
  <text x="300" y="640" text-anchor="middle" class="text">DECISION ENGINE (ATES v4.0)</text>
  <text x="300" y="658" text-anchor="middle" class="subtitle">LOGIC: OPTIMIZE FOR MAX THROUGHPUT</text>

  <path d="M300 680 L300 730" class="arrow" />

  <!-- ARDUINO OUTPUT -->
  <rect x="175" y="730" width="250" height="65" rx="8" fill="#1e293b" class="box" />
  <text x="300" y="765" text-anchor="middle" class="title" font-size="12">HARDWARE OUTPUT</text>
  <text x="300" y="783" text-anchor="middle" class="subtitle" fill="#94a3b8">INTERFACE: ARDUINO MEGA (SERIAL)</text>

  <path d="M300 795 L300 840" class="arrow" />

  <!-- DASHBOARD SYNC -->
  <rect x="200" y="840" width="200" height="55" rx="27.5" fill="url(#grad1)" class="box" />
  <text x="300" y="873" text-anchor="middle" class="title" font-size="12">DASHBOARD SYNC</text>

  <!-- FEEDBACK LOOP -->
  <path d="M175 762 L80 762 L80 155 L150 155" class="arrow" stroke-dasharray="5,5" />
  <text x="90" y="750" class="text" font-size="10" fill="#94a3b8">LOOP RE-EVALUATION</text>
</svg>
